<h1>Country Details</h1>

<div *ngIf="result.length > 0; else loadingBlock">

  <table border="1">

    <thead>

      <tr>
        <th>Flag</th>
        <th>Country Name</th>
        <th>Official Name</th>
        <th>Capital</th>
        <th>Region</th>
        <th>Population</th>
      </tr>

    </thead>

    <tbody>

      <tr
        *ngFor="
          let country of result;
          let i=index;
          trackBy:trackByIndex
        "
      >

        <td><img width="80" height="50" [src]="country?.flags?.png"/></td>

        <td>{{country?.name?.common}}</td>

        <td>{{country?.name?.official}}</td>

        <td>{{country?.capital?.[0]}}</td>

        <td>{{country?.region}}</td>

        <td>{{country?.population}}</td>

      </tr>

    </tbody>

  </table>

</div>

<ng-template #loadingBlock>

  <h2>Loading country data...</h2>

</ng-template>
